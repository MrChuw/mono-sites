name: Build by Tag
on:
    push:
        tags:
            - "*/v*"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read

        steps:
            - name: Extract Service Name and Version
              id: info
              run: |
                  TAG=${{ github.ref_name }}
                  SERVICE=$(echo $TAG | cut -d'/' -f1)
                  VERSION=$(echo $TAG | cut -d'/' -f2 | sed 's/^v//')

                  echo "service_name=$SERVICE" >> $GITHUB_OUTPUT
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
              with:
                  submodules: false

            - name: Init only needed submodule
              run: |
                  git submodule update --init --recursive --depth=1 ./${{ steps.info.outputs.service_name }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

            - name: Log in to GHCR
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Normalize repository owner
              id: owner
              run: |
                  OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
                  echo "owner=$OWNER" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
              with:
                  context: ./${{ steps.info.outputs.service_name }}
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ghcr.io/${{ steps.owner.outputs.owner }}/${{ steps.info.outputs.service_name }}:latest
                      ghcr.io/${{ steps.owner.outputs.owner }}/${{ steps.info.outputs.service_name }}:${{ steps.info.outputs.version }}

                  cache-from: type=gha
                  cache-to: type=gha,mode=max
